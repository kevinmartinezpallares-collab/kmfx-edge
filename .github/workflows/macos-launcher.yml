name: Build macOS Launcher

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Publish downloads/KMFX-Launcher-macOS.zip"
        required: true
        default: false
        type: boolean
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-launcher.yml"
      - "KMFXConnector.ex5"
      - "KMFXConnector.mq5"
      - "assets/logos/**"
      - "launcher/**"
      - "requirements-build.txt"
      - "requirements.txt"
      - "scripts/build_macos_launcher.sh"

permissions:
  contents: read

concurrency:
  group: macos-launcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS launcher
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build package
        run: |
          ./scripts/build_macos_launcher.sh --zip

      - name: Verify package
        run: |
          test -f downloads/KMFX-Launcher-macOS.zip
          test -f downloads/KMFX-Launcher-macOS.zip.sha256
          ls -lh downloads/KMFX-Launcher-macOS.zip downloads/KMFX-Launcher-macOS.zip.sha256
          cat downloads/KMFX-Launcher-macOS.zip.sha256

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMFX-Launcher-macOS
          path: |
            downloads/KMFX-Launcher-macOS.zip
            downloads/KMFX-Launcher-macOS.zip.sha256
          retention-days: 14

  publish:
    name: Publish launcher artifact
    runs-on: ubuntu-latest
    needs: build
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_repo == true)
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download launcher artifact
        uses: actions/download-artifact@v4
        with:
          name: KMFX-Launcher-macOS
          path: downloads

      - name: Stage package changes
        id: changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/KMFX-Launcher-macOS.zip downloads/KMFX-Launcher-macOS.zip.sha256
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No launcher artifact changes to publish."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        id: publish
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          branch="automation/macos-launcher-artifact-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$branch"
          git commit -m "Publish macOS launcher artifact"
          git push -u origin "$branch"
          echo "published_to_main=false" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "::warning title=Launcher artifact branch ready::GitHub Actions generated and pushed $branch. Merge manually when you want to trigger production deploys."
