name: Build Windows Launcher

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Commit downloads/KMFX-Launcher-Windows.zip back to main"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-launcher.yml"
      - "KMFXConnector.ex5"
      - "KMFXConnector.mq5"
      - "assets/logos/**"
      - "launcher/**"
      - "requirements-build.txt"
      - "requirements.txt"
      - "scripts/build_windows_launcher.ps1"
      - "scripts/build_windows_launcher.bat"

permissions:
  contents: write

concurrency:
  group: windows-launcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows launcher
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build package
        shell: pwsh
        run: |
          ./scripts/build_windows_launcher.ps1

      - name: Verify package
        shell: pwsh
        run: |
          $zip = "downloads/KMFX-Launcher-Windows.zip"
          $sha = "$zip.sha256"
          if (!(Test-Path $zip)) { throw "Missing $zip" }
          if (!(Test-Path $sha)) { throw "Missing $sha" }
          Get-ChildItem downloads/KMFX-Launcher-Windows.zip*
          Get-Content $sha

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMFX-Launcher-Windows
          path: |
            downloads/KMFX-Launcher-Windows.zip
            downloads/KMFX-Launcher-Windows.zip.sha256
          retention-days: 14

      - name: Publish package to repository
        if: github.event_name == 'workflow_dispatch' && inputs.publish_to_repo == true
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/KMFX-Launcher-Windows.zip downloads/KMFX-Launcher-Windows.zip.sha256
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No launcher artifact changes to publish."
            exit 0
          }
          git commit -m "Publish Windows launcher artifact"
          git push origin HEAD:main
