name: Build Windows Launcher

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Open a PR with downloads/KMFX-Launcher-Windows.zip"
        required: true
        default: false
        type: boolean
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-launcher.yml"
      - "KMFXConnector.ex5"
      - "KMFXConnector.mq5"
      - "assets/logos/**"
      - "launcher/**"
      - "requirements-build.txt"
      - "requirements.txt"
      - "scripts/build_windows_launcher.ps1"
      - "scripts/build_windows_launcher.bat"

permissions:
  contents: read

concurrency:
  group: windows-launcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows launcher
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build package
        shell: pwsh
        run: |
          ./scripts/build_windows_launcher.ps1

      - name: Verify package
        shell: pwsh
        run: |
          $zip = "downloads/KMFX-Launcher-Windows.zip"
          $sha = "$zip.sha256"
          if (!(Test-Path $zip)) { throw "Missing $zip" }
          if (!(Test-Path $sha)) { throw "Missing $sha" }
          Get-ChildItem downloads/KMFX-Launcher-Windows.zip*
          Get-Content $sha

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMFX-Launcher-Windows
          path: |
            downloads/KMFX-Launcher-Windows.zip
            downloads/KMFX-Launcher-Windows.zip.sha256
          retention-days: 14

  publish:
    name: Open launcher artifact PR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_repo == true
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download launcher artifact
        uses: actions/download-artifact@v4
        with:
          name: KMFX-Launcher-Windows
          path: downloads

      - name: Stage package changes
        id: changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/KMFX-Launcher-Windows.zip downloads/KMFX-Launcher-Windows.zip.sha256
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No launcher artifact changes to publish."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push package branch
        id: branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          branch="automation/windows-launcher-artifact-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$branch"
          git commit -m "Publish Windows launcher artifact"
          git push -u origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Publish Windows launcher artifact" \
            --body "Actualiza el paquete Windows generado por CI y su checksum SHA256. Revisar y fusionar este PR publica la descarga en https://kmfxedge.com/downloads/KMFX-Launcher-Windows.zip."
