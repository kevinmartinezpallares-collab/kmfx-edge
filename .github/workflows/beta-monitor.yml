name: Beta Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: read

concurrency:
  group: beta-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Beta health and usage guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run beta monitor
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          KMFX_BETA_FRONTEND_URL: https://beta.kmfxedge.com
          KMFX_BETA_BACKEND_URL: https://kmfx-edge-api.onrender.com
          KMFX_BETA_MT5_API_URL: https://mt5-api.kmfxedge.com
          KMFX_BETA_MT5_CORS_ORIGIN: https://kmfxedge.com
          KMFX_BETA_MAX_BANDWIDTH_USAGE: "0.05"
        run: python3 scripts/beta_monitor_usage.py | tee beta-monitor.json

      - name: Upload monitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-monitor-report
          path: beta-monitor.json
          if-no-files-found: ignore

      - name: Notify monitor failure
        if: failure()
        env:
          BETA_MONITOR_WEBHOOK_URL: ${{ secrets.BETA_MONITOR_WEBHOOK_URL }}
        run: python3 scripts/beta_monitor_notify.py --report beta-monitor.json
