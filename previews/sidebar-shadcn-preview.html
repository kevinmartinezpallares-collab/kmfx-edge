<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KMFX Edge - Sidebar 07 Preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap");

      :root {
        color-scheme: dark;
        --background: #09090b;
        --foreground: #fafafa;
        --sidebar: #18181b;
        --sidebar-foreground: #fafafa;
        --muted: #a1a1aa;
        --muted-2: #71717a;
        --border: #27272a;
        --surface: #18181b;
        --surface-muted: rgba(255, 255, 255, 0.03);
        --primary: #2563eb;
        --sidebar-width: 410px;
        --sidebar-icon-width: 74px;
        --font: "Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--background);
        color: var(--foreground);
        font-family: var(--font);
        letter-spacing: 0;
      }

      button {
        border: 0;
        background: none;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .icon-sprite {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .app-shell {
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        min-height: 100vh;
        background: var(--background);
        transition: grid-template-columns 180ms ease;
      }

      .app-shell.is-collapsed {
        grid-template-columns: var(--sidebar-icon-width) minmax(0, 1fr);
      }

      .sidebar {
        display: flex;
        min-width: 0;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--sidebar);
      }

      .sidebar-header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 26px 24px 18px;
      }

      .sidebar-main {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 38px;
        overflow: auto;
        padding: 12px 24px 24px;
        scrollbar-width: none;
      }

      .sidebar-main::-webkit-scrollbar {
        display: none;
      }

      .team-switcher,
      .mt5-account,
      .user-trigger,
      .nav-parent,
      .project-link,
      .sidebar-trigger {
        border-radius: 10px;
      }

      .team-switcher {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) 24px;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 58px;
        padding: 0;
        text-align: left;
      }

      .team-icon {
        display: grid;
        place-items: center;
        width: 54px;
        height: 42px;
        overflow: hidden;
        border-radius: 0;
        background: transparent;
      }

      .team-icon img {
        display: block;
        width: 54px;
        height: 42px;
        object-fit: contain;
      }

      .team-title,
      .account-title,
      .user-name {
        display: block;
        overflow: hidden;
        color: var(--sidebar-foreground);
        font-size: 22px;
        font-weight: 500;
        line-height: 1.12;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .team-plan,
      .account-meta,
      .account-balance,
      .user-email {
        display: block;
        overflow: hidden;
        color: var(--foreground);
        font-size: 18px;
        font-weight: 400;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .account-meta,
      .account-balance,
      .user-email {
        color: var(--muted);
      }

      .mt5-account {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 24px;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 8px 0;
        text-align: left;
      }

      .mt5-icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #101013;
      }

      .mt5-icon img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .account-title {
        font-size: 17px;
      }

      .account-meta,
      .account-balance {
        font-size: 13px;
      }

      .account-copy {
        display: grid;
        min-width: 0;
        gap: 2px;
      }

      .chevrons,
      .icon,
      .trigger-icon {
        display: block;
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .chevrons {
        color: var(--foreground);
      }

      .nav-section {
        display: grid;
        gap: 14px;
      }

      .nav-label {
        color: var(--muted);
        font-size: 17px;
        font-weight: 500;
        line-height: 1;
      }

      .nav-list {
        display: grid;
        gap: 16px;
      }

      .nav-parent,
      .project-link {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) 22px;
        align-items: center;
        gap: 12px;
        min-height: 34px;
        width: 100%;
        padding: 0;
        color: var(--foreground);
        text-align: left;
      }

      .nav-parent:hover,
      .project-link:hover,
      .team-switcher:hover,
      .mt5-account:hover,
      .user-trigger:hover,
      .sidebar-trigger:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .nav-parent-label,
      .project-label {
        overflow: hidden;
        font-size: 22px;
        font-weight: 400;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .submenu {
        display: grid;
        gap: 20px;
        margin: 16px 0 0 12px;
        padding: 0 0 2px 30px;
        border-left: 1px solid var(--border);
      }

      .submenu a {
        color: var(--foreground);
        font-size: 21px;
        font-weight: 400;
        line-height: 1.2;
        text-decoration: none;
      }

      .submenu a:hover {
        color: white;
      }

      .project-list {
        display: grid;
        gap: 20px;
      }

      .project-link {
        grid-template-columns: 28px minmax(0, 1fr) auto;
      }

      .project-link.is-muted {
        color: var(--muted);
      }

      .project-link .chevron-right {
        width: 22px;
        height: 22px;
        color: var(--foreground);
        opacity: 0;
      }

      .project-link:hover .chevron-right {
        opacity: 1;
      }

      .sidebar-footer {
        margin-top: auto;
        padding: 22px 24px;
      }

      .user-trigger {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) 24px;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 58px;
        padding: 0;
        text-align: left;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background:
          radial-gradient(circle at 70% 20%, #ffd166 0 10%, transparent 11%),
          radial-gradient(circle at 32% 32%, #60a5fa 0 18%, transparent 19%),
          linear-gradient(135deg, #ec4899, #7c3aed 48%, #2563eb);
        color: white;
        font-size: 17px;
        font-weight: 700;
      }

      .user-name {
        font-size: 21px;
      }

      .user-email {
        color: var(--foreground);
        font-size: 17px;
      }

      .main {
        min-width: 0;
        background: var(--background);
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 18px;
        min-height: 76px;
        padding: 0 30px;
      }

      .sidebar-trigger {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        color: var(--foreground);
      }

      .separator {
        width: 1px;
        height: 28px;
        background: var(--border);
      }

      .breadcrumb {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 18px;
        color: var(--muted);
        font-size: 22px;
        font-weight: 400;
      }

      .breadcrumb-current {
        color: var(--foreground);
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 28px;
        padding: 0 30px 30px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
      }

      .skeleton-card,
      .skeleton-panel {
        border-radius: 20px;
        background: var(--surface);
      }

      .skeleton-card {
        aspect-ratio: 16 / 10;
      }

      .skeleton-panel {
        min-height: calc(100vh - 332px);
      }

      .app-shell.is-collapsed .sidebar-header,
      .app-shell.is-collapsed .sidebar-main,
      .app-shell.is-collapsed .sidebar-footer {
        align-items: center;
        padding-left: 10px;
        padding-right: 10px;
      }

      .app-shell.is-collapsed .team-switcher,
      .app-shell.is-collapsed .mt5-account,
      .app-shell.is-collapsed .user-trigger,
      .app-shell.is-collapsed .nav-parent,
      .app-shell.is-collapsed .project-link {
        grid-template-columns: 52px;
        justify-content: center;
      }

      .app-shell.is-collapsed .team-copy,
      .app-shell.is-collapsed .account-copy,
      .app-shell.is-collapsed .user-copy,
      .app-shell.is-collapsed .chevrons,
      .app-shell.is-collapsed .nav-label,
      .app-shell.is-collapsed .nav-parent-label,
      .app-shell.is-collapsed .project-label,
      .app-shell.is-collapsed .submenu,
      .app-shell.is-collapsed .chevron-right {
        display: none;
      }

      .app-shell.is-collapsed .nav-section {
        gap: 18px;
      }

      .app-shell.is-collapsed .nav-list,
      .app-shell.is-collapsed .project-list {
        gap: 18px;
      }

      @media (max-width: 980px) {
        :root {
          --sidebar-width: 320px;
        }

        .team-title {
          font-size: 19px;
        }

        .team-plan,
        .nav-parent-label,
        .project-label,
        .breadcrumb {
          font-size: 18px;
        }

        .submenu a {
          font-size: 17px;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .app-shell,
        .app-shell.is-collapsed {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: sticky;
          top: 0;
          z-index: 10;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .sidebar-header {
          padding: 12px 16px;
        }

        .sidebar-main,
        .sidebar-footer,
        .mt5-account {
          display: none;
        }

        .topbar,
        .content {
          padding-left: 16px;
          padding-right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-panel-left" viewBox="0 0 24 24">
        <path d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
        <path d="M9 3v18" />
      </symbol>
      <symbol id="icon-chevrons" viewBox="0 0 24 24">
        <path d="m7 15 5 5 5-5M7 9l5-5 5 5" />
      </symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24">
        <path d="m6 9 6 6 6-6" />
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="m9 6 6 6-6 6" />
      </symbol>
      <symbol id="icon-terminal" viewBox="0 0 24 24">
        <path d="M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" />
        <path d="m7 9 3 3-3 3M12 15h5" />
      </symbol>
      <symbol id="icon-bot" viewBox="0 0 24 24">
        <path d="M12 8V4M8 4h8" />
        <path d="M6 10h12a2 2 0 0 1 2 2v6H4v-6a2 2 0 0 1 2-2z" />
        <path d="M9 14h.01M15 14h.01M9 18h6" />
      </symbol>
      <symbol id="icon-book" viewBox="0 0 24 24">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
        <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z" />
      </symbol>
      <symbol id="icon-sliders" viewBox="0 0 24 24">
        <path d="M4 7h6M14 7h6M10 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0z" />
        <path d="M4 17h12M20 17h0M16 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0z" />
      </symbol>
      <symbol id="icon-grid" viewBox="0 0 24 24">
        <path d="M4 4h16M4 12h16M4 20h16M8 4v16M16 4v16" />
      </symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24">
        <path d="M4 19V5M4 19h16" />
        <path d="M8 17V9M12 17V5M16 17v-6" />
      </symbol>
      <symbol id="icon-map" viewBox="0 0 24 24">
        <path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3z" />
        <path d="M9 3v15M15 6v15" />
      </symbol>
      <symbol id="icon-dots" viewBox="0 0 24 24">
        <path d="M5 12h.01M12 12h.01M19 12h.01" />
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M5 5h14a2 2 0 0 1 2 2v12H3V7a2 2 0 0 1 2-2zM16 3v4M8 3v4M3 10h18" />
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h12M8 12h12M8 18h12M4 6h.01M4 12h.01M4 18h.01" />
      </symbol>
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 20 6v6c0 5-3 8-8 9-5-1-8-4-8-9V6z" />
        <path d="m9 12 2 2 4-5" />
      </symbol>
    </svg>

    <div class="app-shell" id="appShell">
      <aside class="sidebar" aria-label="KMFX Edge">
        <div class="sidebar-header">
          <button class="team-switcher" type="button" aria-label="KMFX Edge">
            <span class="team-icon" aria-hidden="true">
              <img src="../assets/brand/kmfx-edge/logo/raster/kmfx-edge-symbol-transparent.png" alt="" />
            </span>
            <span class="team-copy">
              <span class="team-title">KMFX Edge</span>
              <span class="team-plan">Trading cockpit</span>
            </span>
            <svg class="chevrons" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevrons" /></svg>
          </button>

          <button class="mt5-account" type="button" data-preserve-current-modal="account" aria-label="Cuenta MT5 conectada">
            <span class="mt5-icon" aria-hidden="true">
              <img src="../assets/logos/mt5-logo.png" alt="" />
            </span>
            <span class="account-copy">
              <span class="account-title">KMFX Live 01</span>
              <span class="account-meta">MT5 / Real account</span>
              <span class="account-balance">$52,480.00</span>
            </span>
            <svg class="chevrons" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevrons" /></svg>
          </button>
        </div>

        <div class="sidebar-main">
          <section class="nav-section" aria-label="Platform">
            <div class="nav-label">Platform</div>
            <div class="nav-list">
              <div>
                <button class="nav-parent" type="button">
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-terminal" /></svg>
                  <span class="nav-parent-label">Dashboard</span>
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-down" /></svg>
                </button>
                <div class="submenu">
                  <a href="#">Resumen</a>
                  <a href="#">Calendario</a>
                  <a href="#">Operaciones</a>
                </div>
              </div>

              <button class="nav-parent" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-bot" /></svg>
                <span class="nav-parent-label">Risk Engine</span>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>

              <button class="nav-parent" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-book" /></svg>
                <span class="nav-parent-label">Insights</span>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>

              <button class="nav-parent" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-sliders" /></svg>
                <span class="nav-parent-label">Ajustes</span>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>
            </div>
          </section>

          <section class="nav-section" aria-label="Projects">
            <div class="nav-label">Projects</div>
            <div class="project-list">
              <button class="project-link" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-grid" /></svg>
                <span class="project-label">Cuentas MT5</span>
                <svg class="chevron-right" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>
              <button class="project-link" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chart" /></svg>
                <span class="project-label">Capital</span>
                <svg class="chevron-right" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>
              <button class="project-link" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-map" /></svg>
                <span class="project-label">Funding</span>
                <svg class="chevron-right" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
              </button>
              <button class="project-link is-muted" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-dots" /></svg>
                <span class="project-label">More</span>
                <span></span>
              </button>
            </div>
          </section>
        </div>

        <div class="sidebar-footer">
          <button class="user-trigger" type="button" data-preserve-current-modal="user" aria-label="Abrir acciones de usuario">
            <span class="avatar" aria-hidden="true">KC</span>
            <span class="user-copy">
              <span class="user-name">Kevin C.</span>
              <span class="user-email">kevin@kmfxedge.com</span>
            </span>
            <svg class="chevrons" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevrons" /></svg>
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="sidebar-trigger" id="sidebarTrigger" type="button" aria-label="Toggle Sidebar">
            <svg class="trigger-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-panel-left" /></svg>
          </button>
          <span class="separator" aria-hidden="true"></span>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span>KMFX Edge</span>
            <span aria-hidden="true">›</span>
            <span class="breadcrumb-current">Dashboard</span>
          </nav>
        </header>

        <section class="content">
          <div class="card-grid">
            <div class="skeleton-card" aria-hidden="true"></div>
            <div class="skeleton-card" aria-hidden="true"></div>
            <div class="skeleton-card" aria-hidden="true"></div>
          </div>
          <div class="skeleton-panel" aria-hidden="true"></div>
        </section>
      </main>
    </div>

    <script>
      const appShell = document.getElementById("appShell");
      const sidebarTrigger = document.getElementById("sidebarTrigger");

      sidebarTrigger.addEventListener("click", () => {
        appShell.classList.toggle("is-collapsed");
      });
    </script>
  </body>
</html>
